version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    environment:
      - CONTRACT_ADDRESS=${CONTRACT_ADDRESS:-EQA_placeholder}
      - OPERATOR_MNEMONIC=${OPERATOR_MNEMONIC:-}
      - TONCENTER_API_KEY=${TONCENTER_API_KEY:-}
      - TONCENTER_BASE_URL=${TONCENTER_BASE_URL:-https://testnet.toncenter.com/api/v2}
      - DATABASE_URL=sqlite+aiosqlite:////app/data/mini_rollup.db
      - OPERATOR_API_KEY=${OPERATOR_API_KEY:-dev-operator-key}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  backend_data:
